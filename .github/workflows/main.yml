name: Bot_SCM_Tiap_Malam
on:
  schedule:
    # Menit ke-23 di setiap 4 jam
    - cron: '23 */4 * * *' 
  workflow_dispatch:

jobs:
  eksekusi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Library
        # Gunakan --upgrade agar library selalu mendukung versi Chrome terbaru di GitHub
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade requests selenium undetected-chromedriver pandas openpyxl
        
      - name: Jalankan Bot
        env:
          EMAIL_SCM: ${{ secrets.EMAIL_SCM }}
          PASS_SCM: ${{ secrets.PASS_SCM }}
        run: python bot_scm.py
