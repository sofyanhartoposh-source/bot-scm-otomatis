name: Bot_SCM_Tiap_Malam
on:
  schedule:
    # Menit ke-43 di setiap 1 jam
    - cron: '43 */1 * * *' 
  workflow_dispatch:

jobs:
  eksekusi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Library
        # Di sini rahasianya Boss, kita tambah --upgrade supaya tidak ketinggalan zaman
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade requests selenium undetected-chromedriver pandas openpyxl
        
      - name: Jalankan Bot
        # Bagian env ini yang WAJIB ada supaya bot bisa baca Secret kamu
        env:
          EMAIL_SCM: ${{ secrets.EMAIL_SCM }}
          PASS_SCM: ${{ secrets.PASS_SCM }}
        run: python bot_scm.py
